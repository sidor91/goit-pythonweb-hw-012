<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Password Reset</title>
</head>
<body>
<p>Hi {{username}},</p>
<p>You requested to reset your password. Please follow the link below to complete the process:</p>
<p>
    <a href="{{host}}api/auth/reset-password?token={{token}}">
        Reset your password
    </a>
</p>
<p>If you did not request this, please ignore this email.</p>
<p>Thanks,</p>
<p>The Team</p>
</body>
</html>
